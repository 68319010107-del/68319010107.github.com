<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Front-End Slide</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body{
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    /* Slide Container */
    .slideshow-container{
      position:relative;
      width:1000px;
      height:300px;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .mySlides{
      display:none;
      width:100%;
      height:100%;
      position:absolute;
      animation:fade 1s;
    }

    /* Slide Design */
    .slide-content{
      width:100%;
      height:100%;
      position:relative;
      color:white;
      padding:40px 60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    /* Background Themes */
    .slide1{
      background:
      linear-gradient(
        135deg,
        rgba(15,23,42,0.95),
        rgba(30,41,59,0.90)
      ),
      url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .slide2{
      background:
      linear-gradient(
        135deg,
        rgba(2,132,199,0.90),
        rgba(15,23,42,0.92)
      ),
      url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .slide3{
      background:
      linear-gradient(
        135deg,
        rgba(124,58,237,0.88),
        rgba(15,23,42,0.95)
      ),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .title{
      font-size:40px;
      font-weight:700;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:20px;
      color:#cbd5e1;
      margin-bottom:20px;
    }

    .tag{
      width:max-content;
      padding:10px 20px;
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:50px;
      backdrop-filter:blur(5px);
      font-size:15px;
    }

    /* Navigation Buttons */
    .prev, .next{
      cursor:pointer;
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      padding:14px;
      color:white;
      font-weight:bold;
      font-size:22px;
      background:rgba(0,0,0,0.3);
      user-select:none;
      border-radius:50%;
      transition:0.3s;
    }

    .prev:hover,
    .next:hover{
      background:rgba(255,255,255,0.2);
    }

    .prev{
      left:15px;
    }

    .next{
      right:15px;
    }

    /* Dots */
    .dots{
      position:absolute;
      bottom:15px;
      width:100%;
      text-align:center;
    }

    .dot{
      cursor:pointer;
      height:12px;
      width:12px;
      margin:0 4px;
      background:#bbb;
      border-radius:50%;
      display:inline-block;
      transition:0.3s;
    }

    .active,
    .dot:hover{
      background:#ffffff;
    }

    @keyframes fade{
      from{opacity:0.4}
      to{opacity:1}
    }
  </style>
</head>

<body>

<div class="slideshow-container">

  <!-- Slide 1 -->
  <div class="mySlides">
    <div class="slide-content slide1">
      <div class="title">Front-End Development</div>
      <div class="subtitle">
        การพัฒนาซอฟต์แวร์ด้วยเทคโนโลยี Front-End
      </div>
      <div class="tag">HTML • CSS • JavaScript</div>
    </div>
  </div>

  <!-- Slide 2 -->
  <div class="mySlides">
    <div class="slide-content slide2">
      <div class="title">Modern UI / UX Design</div>
      <div class="subtitle">
        ออกแบบเว็บไซต์ให้ทันสมัย รองรับทุกอุปกรณ์
      </div>
      <div class="tag">Responsive • Interactive • Creative</div>
    </div>
  </div>

  <!-- Slide 3 -->
  <div class="mySlides">
    <div class="slide-content slide3">
      <div class="title">Web Technology & Framework</div>
      <div class="subtitle">
        เรียนรู้การใช้งาน Framework และเครื่องมือสมัยใหม่
      </div>
      <div class="tag">React • Vue • Bootstrap</div>
    </div>
  </div>

  <!-- Buttons -->
  <a class="prev" onclick="plusSlides(-1)">❮</a>
  <a class="next" onclick="plusSlides(1)">❯</a>

  <!-- Dots -->
  <div class="dots">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
  </div>

</div>

<script>

let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {

  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");

  if (n > slides.length) {
    slideIndex = 1;
  }

  if (n < 1) {
    slideIndex = slides.length;
  }

  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  for (i = 0; i < dots.length; i++) {
    dots[i].className =
      dots[i].className.replace(" active", "");
  }

  slides[slideIndex - 1].style.display = "block";
  dots[slideIndex - 1].className += " active";
}

/* Auto Slide */
setInterval(() => {
  plusSlides(1);
}, 4000);

</script>

</body>
</html>
